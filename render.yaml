services:
  # 1. FastAPI Backend (Web Service)
  - type: web
    name: smart-home-energy-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Specify python version if needed

  # 2. React Vite Frontend (Static Site)
  - type: web # Render classifies Static Sites under type 'web' with env 'static'
    name: smart-home-energy-dashboard
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # React SPA Routing: Rewrite all unmatched requests to index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: smart-home-energy-api
          envVarKey: RENDER_EXTERNAL_URL
